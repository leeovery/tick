version: "2"

linters:
  # Standard set: errcheck, govet, ineffassign, staticcheck, unused.
  default: standard
  enable:
    - modernize
  exclusions:
    rules:
      # Tests routinely ignore cleanup errors (defer store.Close(), etc.).
      - path: _test\.go
        linters:
          - errcheck
  settings:
    errcheck:
      exclude-functions:
        # Best-effort closes (mostly deferred) and writes to stdout/stderr.
        - (io.Closer).Close
        - (*os.File).Close
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Stmt).Close
        - (*github.com/leeovery/tick/internal/storage.Cache).Close
        - (*github.com/leeovery/tick/internal/storage.Store).Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    staticcheck:
      checks:
        - all
        # Defaults preserved from golangci-lint's standard exclusions.
        - -ST1000
        - -ST1003
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022
        # CLI error messages are deliberate full sentences ("... Run 'tick help' for usage.").
        - -ST1005

formatters:
  enable:
    - gofmt
